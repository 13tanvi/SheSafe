<!DOCTYPE html>
<html>
<head>
  <title>Delivery Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Delivery Exception Dashboard</h1>

<!-- FILTERS -->
<div class="filters">
  <select id="filterType">
    <option value="">All Issues</option>
    <option>Address Not Found</option>
    <option>Customer Not Available</option>
    <option>Payment Issue</option>
    <option>Package Damaged</option>
  </select>

  <select id="filterStatus">
    <option value="">All Status</option>
    <option>Open</option>
    <option>Resolved</option>
  </select>
</div>

<h3>
  Open: <span id="openCount">0</span> |
  Resolved: <span id="resolvedCount">0</span>
</h3>

<!-- FORM -->
<form id="form">
  <input type="text" id="deliveryId" placeholder="Delivery ID" required>
  <input type="text" id="customerName" placeholder="Customer Name" required>

  <select id="issueType" required>
    <option value="">Select Issue</option>
    <option>Address Not Found</option>
    <option>Customer Not Available</option>
    <option>Payment Issue</option>
    <option>Package Damaged</option>
  </select>

  <div>
    <label><input type="radio" name="priority" value="Low" required> Low</label>
    <label><input type="radio" name="priority" value="Medium"> Medium</label>
    <label><input type="radio" name="priority" value="High"> High</label>
  </div>

  <button type="submit">Add</button>
</form>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Issue</th>
      <th>Priority</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
